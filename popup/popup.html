<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ObsiCapture</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				width: 320px;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				background: #1a1a2e;
				color: #e8e8f0;
			}

			.header {
				padding: 16px 20px 12px;
				border-bottom: 1px solid #2a2a4a;
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.logo {
				font-size: 20px;
			}

			.header-text h1 {
				font-size: 15px;
				font-weight: 700;
				color: #c8b5f5;
			}

			.header-text p {
				font-size: 11px;
				color: #888;
				margin-top: 1px;
			}

			.body {
				padding: 16px 20px;
			}

			.platform-badge {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 4px 10px;
				border-radius: 20px;
				font-size: 11px;
				font-weight: 600;
				margin-bottom: 12px;
			}

			.platform-badge.claude {
				background: #2d1f4e;
				color: #c8b5f5;
			}
			.platform-badge.chatgpt {
				background: #1a3a2a;
				color: #7ec8a0;
			}
			.platform-badge.unknown {
				background: #2a2a2a;
				color: #888;
			}

			.title-preview {
				font-size: 13px;
				color: #ccc;
				margin-bottom: 16px;
				line-height: 1.4;
				max-height: 40px;
				overflow: hidden;
				text-overflow: ellipsis;
				display: -webkit-box;
				-webkit-line-clamp: 2;
				-webkit-box-orient: vertical;
			}

			.save-btn {
				width: 100%;
				padding: 12px;
				background: linear-gradient(135deg, #7c4dff, #5c35cc);
				color: white;
				border: none;
				border-radius: 10px;
				font-size: 14px;
				font-weight: 700;
				cursor: pointer;
				transition: opacity 0.2s;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
			}

			.save-btn:hover {
				opacity: 0.9;
			}
			.save-btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			.status {
				margin-top: 12px;
				padding: 10px 14px;
				border-radius: 8px;
				font-size: 12px;
				line-height: 1.5;
				display: none;
			}

			.status.loading {
				background: #1e2a40;
				color: #7bb3f0;
				display: block;
			}
			.status.success {
				background: #1a3a2a;
				color: #7ec8a0;
				display: block;
			}
			.status.error {
				background: #3a1a1a;
				color: #f07b7b;
				display: block;
			}

			.footer {
				padding: 10px 20px;
				border-top: 1px solid #2a2a4a;
				display: flex;
				justify-content: flex-end;
			}

			.settings-link {
				font-size: 11px;
				color: #666;
				cursor: pointer;
				text-decoration: none;
			}

			.settings-link:hover {
				color: #aaa;
			}

			.folder-select {
				width: 100%;
				padding: 8px 12px;
				background: #12122a;
				border: 1.5px solid #3a3a5a;
				border-radius: 8px;
				color: #e8e8f0;
				font-size: 12px;
				outline: none;
				margin-bottom: 8px;
				display: none;
				cursor: pointer;
				box-sizing: border-box;
			}
			.folder-select:focus {
				border-color: #7c4dff;
			}
			.folder-select.visible {
				display: block;
			}

			.filename-input {
				width: 100%;
				padding: 8px 12px;
				background: #12122a;
				border: 1.5px solid #3a3a5a;
				border-radius: 8px;
				color: #e8e8f0;
				font-size: 12px;
				outline: none;
				margin-bottom: 8px;
				display: none;
				box-sizing: border-box;
				font-family: inherit;
			}
			.filename-input:focus {
				border-color: #7c4dff;
			}
			.filename-input.visible {
				display: block;
			}

			.field-label {
				font-size: 10px;
				color: #666;
				margin-bottom: 4px;
				display: none;
			}
			.field-label.visible {
				display: block;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<span class="logo">📎</span>
			<div class="header-text">
				<h1>ObsiCapture</h1>
				<p>AI 대화 → Obsidian</p>
			</div>
		</div>

		<div id="main-content">
			<div class="body">
				<div id="platform-badge" class="platform-badge unknown">감지 중...</div>
				<div id="title-preview" class="title-preview">
					페이지를 분석하는 중...
				</div>
				<div id="label-folder" class="field-label">📁 저장 폴더</div>
				<select id="folder-select" class="folder-select">
					<option value="(vault 루트)">(vault 루트)</option>
				</select>
				<div class="field-label visible">💬 추가 지시사항 (선택)</div>
				<input
					id="custom-prompt"
					class="filename-input visible"
					type="text"
					placeholder="예: 블로그 형식으로 요약해줘"
				/>
				<div id="label-filename" class="field-label">📄 파일명</div>
				<input
					id="filename-input"
					class="filename-input"
					type="text"
					placeholder="파일명 (수정 가능)"
				/>
				<button id="save-btn" class="save-btn" disabled>
					<span>💾</span> Obsidian에 저장
				</button>
				<button
					id="confirm-btn"
					class="save-btn"
					style="
						display: none;
						background: linear-gradient(135deg, #2e7d52, #1a5c3a);
						margin-top: 8px;
					"
				>
					<span>✅</span> 이 이름으로 저장
				</button>
				<div id="status" class="status"></div>
			</div>
		</div>

		<div class="footer">
			<a class="settings-link" id="settings-link">⚙️ 설정</a>
		</div>

		<script src="popup.js"></script>
	</body>
</html>
