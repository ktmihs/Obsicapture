<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--vscode-font-family);
      background: var(--vscode-editor-background);
      color: var(--vscode-editor-foreground);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--vscode-panel-border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-logo { font-size: 18px; }
    .header-info { flex: 1; }
    .header-title { font-size: 14px; font-weight: 700; color: #c8b5f5; }
    .header-meta { font-size: 11px; color: var(--vscode-descriptionForeground); margin-top: 1px; }
    .mode-badge {
      display: none;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .mode-badge.api  { display: block; background: rgba(123,179,240,0.15); color: #7bb3f0; }
    .mode-badge.cli-ok  { display: block; background: rgba(126,200,160,0.15); color: #7ec8a0; }
    .mode-badge.cli-err { display: block; background: rgba(240,123,123,0.15); color: #f07b7b; }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 20px;
      gap: 12px;
    }

    .workspace-info {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      background: var(--vscode-input-background);
      border-radius: 6px;
      padding: 8px 12px;
      display: none;
    }
    .workspace-info.visible { display: block; }
    .workspace-info strong { color: #c8b5f5; }

    .prompt-label { font-size: 11px; color: var(--vscode-descriptionForeground); margin-bottom: 4px; }
    .prompt-meta { display: flex; justify-content: flex-end; font-size: 10px; color: var(--vscode-descriptionForeground); margin-top: 3px; }
    .char-count.over { color: #f07b7b; }

    textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      color: var(--vscode-input-foreground);
      font-family: var(--vscode-font-family);
      font-size: 13px;
      resize: none;
      outline: none;
      min-height: 80px;
    }
    textarea:focus { border-color: #7c4dff; }

    .generate-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #7c4dff, #5c35cc);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .generate-btn:hover { opacity: 0.88; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .preview-wrap {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .preview-wrap.visible { display: flex; }
    .preview-label { font-size: 11px; color: var(--vscode-descriptionForeground); margin-bottom: 4px; }
    .preview {
      flex: 1;
      overflow-y: auto;
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      padding: 12px;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .save-area {
      display: none;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .save-area.visible { display: flex; }

    .row { display: flex; gap: 8px; }

    select, input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      color: var(--vscode-input-foreground);
      font-family: var(--vscode-font-family);
      font-size: 12px;
      outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: #7c4dff; }

    .save-btn {
      padding: 9px 16px;
      background: linear-gradient(135deg, #2e7d52, #1a5c3a);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.88; }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .icon-btn {
      padding: 7px 10px;
      background: var(--vscode-input-background);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      color: var(--vscode-input-foreground);
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: #7c4dff; color: #c8b5f5; }
    .icon-btn.confirm { color: #7ec8a0; }
    .icon-btn.cancel  { color: #f07b7b; }

    .new-folder-row {
      display: none;
      gap: 6px;
    }
    .new-folder-row.visible { display: flex; }

    .status {
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .status.loading { display: block; background: rgba(123,179,240,0.1); color: #7bb3f0; }
    .status.success { display: block; background: rgba(126,200,160,0.1); color: #7ec8a0; }
    .status.error   { display: block; background: rgba(240,123,123,0.1); color: #f07b7b; }

    .footer {
      padding: 8px 20px;
      border-top: 1px solid var(--vscode-panel-border);
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .settings-link {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      cursor: pointer;
      background: none;
      border: none;
    }
    .settings-link:hover { color: #c8b5f5; }

    .cursor::after { content: '|'; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-logo">&#x1F4CE;</span>
    <div class="header-info">
      <div class="header-title">ObsiCapture</div>
      <div class="header-meta" id="header-meta">준비 중...</div>
    </div>
    <div class="mode-badge" id="mode-badge"></div>
  </div>

  <div class="body">
    <div class="workspace-info" id="workspace-info"></div>

    <div>
      <div class="prompt-label">어떤 문서를 만들까요?</div>
      <textarea id="prompt" placeholder="예: 이 프로젝트의 API 레퍼런스 문서 작성해줘"></textarea>
      <div class="prompt-meta" id="char-meta" style="display:none">
        <span class="char-count" id="char-count">0</span><span id="char-limit-label"></span>
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">&#x2728; 문서 생성</button>

    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-label">미리보기</div>
      <div class="preview" id="preview"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="save-area" id="save-area">
      <div class="row">
        <select id="folder-select" style="flex:1"></select>
        <button class="icon-btn" id="new-folder-btn" title="새 폴더 만들기">+</button>
      </div>
      <div class="row">
        <input type="text" id="filename-input" placeholder="파일명" style="flex:1" />
      </div>
      <div class="new-folder-row" id="new-folder-row">
        <input type="text" id="new-folder-input" placeholder="새 폴더 경로 (예: notes/daily)" style="flex:1;padding:7px 10px;background:var(--vscode-input-background);border:1px solid var(--vscode-input-border);border-radius:6px;color:var(--vscode-input-foreground);font-family:var(--vscode-font-family);font-size:12px;outline:none;" />
        <button class="icon-btn confirm" id="new-folder-confirm" title="만들기">&#x2713;</button>
        <button class="icon-btn cancel"  id="new-folder-cancel"  title="취소">&#x2715;</button>
      </div>
      <button class="save-btn" id="save-btn">&#x1F4BE; Obsidian에 저장</button>
    </div>
  </div>

  <div class="footer">
    <button class="settings-link" id="settings-link">&#x2699; 설정</button>
  </div>

  <script nonce="{{NONCE}}">
    var vscode = acquireVsCodeApi();

    var els = {
      meta:            document.getElementById('header-meta'),
      badge:           document.getElementById('mode-badge'),
      info:            document.getElementById('workspace-info'),
      prompt:          document.getElementById('prompt'),
      charMeta:        document.getElementById('char-meta'),
      charCount:       document.getElementById('char-count'),
      charLimitLabel:  document.getElementById('char-limit-label'),
      generateBtn:     document.getElementById('generate-btn'),
      previewWrap:     document.getElementById('preview-wrap'),
      preview:         document.getElementById('preview'),
      status:          document.getElementById('status'),
      saveArea:        document.getElementById('save-area'),
      folderSel:       document.getElementById('folder-select'),
      newFolderBtn:    document.getElementById('new-folder-btn'),
      newFolderRow:    document.getElementById('new-folder-row'),
      newFolderInput:  document.getElementById('new-folder-input'),
      newFolderConfirm:document.getElementById('new-folder-confirm'),
      newFolderCancel: document.getElementById('new-folder-cancel'),
      fileInput:       document.getElementById('filename-input'),
      saveBtn:         document.getElementById('save-btn'),
      settingsLink:    document.getElementById('settings-link'),
    };

    var maxCharsLimit = 0;

    function updateCharCount() {
      var len = els.prompt.value.length;
      els.charCount.textContent = len;
      if (maxCharsLimit > 0) {
        els.charCount.className = len > maxCharsLimit ? 'char-count over' : 'char-count';
      }
    }

    els.prompt.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') els.generateBtn.click();
    });

    els.prompt.addEventListener('input', updateCharCount);

    els.generateBtn.addEventListener('click', function() {
      var prompt = els.prompt.value.trim();
      if (!prompt) return;
      vscode.postMessage({ type: 'GENERATE', prompt: prompt });
    });

    els.saveBtn.addEventListener('click', function() {
      vscode.postMessage({
        type: 'SAVE',
        fileName: els.fileInput.value.trim() || 'untitled',
        folder: els.folderSel.value,
      });
    });

    els.newFolderBtn.addEventListener('click', function() {
      els.newFolderRow.classList.toggle('visible');
      if (els.newFolderRow.classList.contains('visible')) {
        els.newFolderInput.focus();
      }
    });

    els.newFolderCancel.addEventListener('click', function() {
      els.newFolderRow.classList.remove('visible');
      els.newFolderInput.value = '';
    });

    function submitNewFolder() {
      var folderPath = els.newFolderInput.value.trim();
      if (!folderPath) { return; }
      els.newFolderConfirm.disabled = true;
      vscode.postMessage({ type: 'CREATE_FOLDER', folderPath: folderPath });
    }

    els.newFolderConfirm.addEventListener('click', submitNewFolder);
    els.newFolderInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { submitNewFolder(); }
      if (e.key === 'Escape') { els.newFolderCancel.click(); }
    });

    els.settingsLink.addEventListener('click', function() {
      vscode.postMessage({ type: 'OPEN_SETTINGS' });
    });

    window.addEventListener('message', function(event) {
      var data = event.data;
      switch (data.type) {
        case 'READY_ACK':
          els.meta.textContent = data.workspaceName;
          els.info.innerHTML = '<strong>' + data.workspaceName + '</strong> 프로젝트';
          els.info.classList.add('visible');
          els.folderSel.innerHTML = data.folders.map(function(f) {
            return '<option value="' + f + '"' + (f === data.defaultFolder ? ' selected' : '') + '>' + f + '</option>';
          }).join('');
          maxCharsLimit = data.maxChars || 0;
          if (maxCharsLimit > 0) {
            els.prompt.maxLength = maxCharsLimit;
            els.charLimitLabel.textContent = ' / ' + maxCharsLimit + '자';
            els.charMeta.style.display = 'flex';
          }
          if (data.mode === 'api') {
            els.badge.textContent = 'API';
            els.badge.className = 'mode-badge api';
          } else if (data.mode === 'cli') {
            if (data.cliAvailable) {
              els.badge.textContent = (data.cliUser ? data.cliUser + '님 · ' : '') + 'CLI';
              els.badge.className = 'mode-badge cli-ok';
            } else {
              els.badge.textContent = 'CLI 오류';
              els.badge.className = 'mode-badge cli-err';
            }
          }
          break;

        case 'STREAM_START':
          els.previewWrap.classList.add('visible');
          els.preview.textContent = '';
          els.preview.classList.add('cursor');
          els.saveArea.classList.remove('visible');
          els.generateBtn.disabled = true;
          setStatus('loading', '문서 생성 중...');
          break;

        case 'STREAM_CHUNK':
          els.preview.textContent += data.text;
          els.preview.scrollTop = els.preview.scrollHeight;
          break;

        case 'STREAM_DONE':
          els.preview.classList.remove('cursor');
          els.generateBtn.disabled = false;
          els.fileInput.value = data.suggestedFileName;
          els.saveArea.classList.add('visible');
          setStatus('success', '생성 완료! 파일명 확인 후 저장하세요.');
          break;

        case 'FOLDER_CREATED':
          els.folderSel.innerHTML = data.folders.map(function(f) {
            return '<option value="' + f + '"' + (f === data.newFolder ? ' selected' : '') + '>' + f + '</option>';
          }).join('');
          els.newFolderRow.classList.remove('visible');
          els.newFolderInput.value = '';
          els.newFolderConfirm.disabled = false;
          setStatus('success', '폴더 생성 완료: ' + data.newFolder);
          break;

        case 'SAVE_DONE':
          setStatus('success', '저장 완료! ' + data.path);
          els.saveBtn.disabled = false;
          els.previewWrap.classList.remove('visible');
          els.saveArea.classList.remove('visible');
          els.preview.textContent = '';
          els.fileInput.value = '';
          break;

        case 'ERROR':
          els.preview.classList.remove('cursor');
          els.generateBtn.disabled = false;
          els.saveBtn.disabled = false;
          setStatus('error', '[오류] ' + data.message);
          break;
      }
    });

    function setStatus(type, msg) {
      els.status.className = 'status ' + type;
      els.status.textContent = msg;
    }

    vscode.postMessage({ type: 'READY' });
  </script>
</body>
</html>
