<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<title>ObsiCapture 설정</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				background: #f5f5f7;
				color: #1a1a2e;
				min-height: 100vh;
			}
			.container {
				max-width: 600px;
				margin: 0 auto;
				padding: 40px 24px;
			}
			.page-title {
				font-size: 24px;
				font-weight: 800;
				color: #1a1a2e;
				margin-bottom: 6px;
			}
			.page-subtitle {
				font-size: 14px;
				color: #888;
				margin-bottom: 32px;
			}
			.card {
				background: white;
				border-radius: 16px;
				padding: 24px;
				margin-bottom: 20px;
				box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
			}
			.card-title {
				font-size: 15px;
				font-weight: 700;
				color: #1a1a2e;
				margin-bottom: 16px;
			}
			.field {
				margin-bottom: 16px;
			}
			.field label {
				display: block;
				font-size: 13px;
				font-weight: 600;
				color: #444;
				margin-bottom: 6px;
			}
			.field input[type='password'] {
				width: 100%;
				padding: 10px 14px;
				border: 1.5px solid #e0e0e0;
				border-radius: 8px;
				font-size: 13px;
				outline: none;
				transition: border-color 0.2s;
			}
			.field input:focus {
				border-color: #7c4dff;
			}
			.field .hint {
				font-size: 11px;
				color: #aaa;
				margin-top: 4px;
				line-height: 1.6;
			}
			.folder-btn {
				width: 100%;
				padding: 12px;
				background: white;
				border: 2px solid #7c4dff;
				color: #7c4dff;
				border-radius: 8px;
				font-size: 13px;
				font-weight: 700;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				transition: background 0.2s;
			}
			.folder-btn:hover {
				background: #f5f0ff;
			}
			.folder-selected {
				font-size: 12px;
				color: #34a853;
				margin-top: 8px;
				display: none;
			}
			.save-btn {
				width: 100%;
				padding: 14px;
				background: linear-gradient(135deg, #7c4dff, #5c35cc);
				color: white;
				border: none;
				border-radius: 12px;
				font-size: 15px;
				font-weight: 700;
				cursor: pointer;
				transition: opacity 0.2s;
			}
			.save-btn:hover {
				opacity: 0.9;
			}
			.toast {
				position: fixed;
				bottom: 24px;
				left: 50%;
				transform: translateX(-50%);
				background: #1a1a2e;
				color: white;
				padding: 12px 24px;
				border-radius: 24px;
				font-size: 13px;
				opacity: 0;
				transition: opacity 0.3s;
				pointer-events: none;
			}
			.toast.show {
				opacity: 1;
			}
			/* 저장 모드 선택 */
			.mode-options {
				display: flex;
				flex-direction: column;
				gap: 10px;
			}
			.mode-option {
				display: flex;
				align-items: flex-start;
				gap: 12px;
				padding: 14px 16px;
				border: 2px solid #e0e0e0;
				border-radius: 10px;
				cursor: pointer;
				transition:
					border-color 0.2s,
					background 0.2s;
			}
			.mode-option:has(input:checked) {
				border-color: #7c4dff;
				background: #f5f0ff;
			}
			.mode-option input[type='radio'] {
				margin-top: 2px;
				accent-color: #7c4dff;
				flex-shrink: 0;
			}
			.mode-title {
				font-size: 14px;
				font-weight: 700;
				color: #1a1a2e;
				margin-bottom: 3px;
			}
			.mode-desc {
				font-size: 12px;
				color: #888;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="page-title">📎 ObsiCapture 설정</div>
			<div class="page-subtitle">처음 한 번만 설정하면 돼요.</div>

			<div class="card">
				<div class="card-title">⚡ 저장 모드</div>
				<div class="mode-options">
					<label class="mode-option">
						<input
							type="radio"
							name="mode"
							value="summarize"
							id="mode-summarize"
						/>
						<div>
							<div class="mode-title">🤖 AI 요약 저장</div>
							<div class="mode-desc">
								Claude Haiku가 대화를 요약·정리해서 저장 (API 키 필요)
							</div>
						</div>
					</label>
					<label class="mode-option">
						<input type="radio" name="mode" value="raw" id="mode-raw" />
						<div>
							<div class="mode-title">📄 원문 그대로 저장</div>
							<div class="mode-desc">
								API 키 없이 대화 내용을 마크다운으로 그대로 저장
							</div>
						</div>
					</label>
				</div>
			</div>

			<div class="card" id="api-key-card">
				<div class="card-title">🔑 Claude API 키</div>
				<div class="field">
					<input
						type="password"
						id="claude-api-key"
						placeholder="sk-ant-api03-..."
					/>
					<div class="hint">
						<a
							href="https://console.anthropic.com/keys"
							target="_blank"
							style="color: #7c4dff"
							>Anthropic Console</a
						>에서 발급. Haiku 모델만 사용해 비용이 거의 없어요.
					</div>
				</div>
			</div>

			<div class="card">
				<div class="card-title">📁 Obsidian Vault 폴더</div>
				<div class="field">
					<button class="folder-btn" id="folder-picker-btn">
						📁 Vault 폴더 선택
					</button>
					<div class="folder-selected" id="folder-selected"></div>
					<div class="hint" style="margin-top: 8px">
						한 번만 선택하면 이후엔 자동으로 저장돼요.
					</div>
				</div>
			</div>

			<button class="save-btn" id="save-btn">설정 저장</button>
		</div>

		<div class="toast" id="toast"></div>
		<script src="options.js"></script>
	</body>
</html>
